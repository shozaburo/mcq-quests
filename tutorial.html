<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>🔰 初心者の館｜MANDALA QUEST</title>
<style>
:root{
  --bg:#f3efe6; --panel:#ffffff; --gold:#b8860b; --gold-soft:#caa53d; --gold-deep:#9c6f08;
  --ink:#2b3046; --dim:#767c93; --line:rgba(184,134,11,.28); --line2:#e7e1d3;
  --pink:#e0568a; --green:#4b9e57; --red:#d64c48; --cyan:#2f9fb2; --purple:#7e57c2;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--ink);font-family:"Yu Gothic","Hiragino Sans",sans-serif;line-height:1.65;overflow:hidden}
a{color:var(--gold-deep)}

/* ===== 1画面ステージ ===== */
.stage{height:100dvh;display:flex;flex-direction:column;max-width:720px;margin:0 auto;
  background:var(--panel);box-shadow:0 0 40px rgba(43,48,70,.12)}

/* 上部バナー（古民家セミナー会場） */
.banner{position:relative;height:34vh;min-height:190px;flex-shrink:0;
  background:url('assets/venue-kominka.png') center 38%/cover no-repeat;}
@media(max-height:760px),(max-width:560px){.banner{height:24vh;min-height:150px}}
.banner::after{content:"";position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(20,15,8,.28) 0%,transparent 34%,transparent 55%,rgba(255,255,255,.06) 78%,var(--panel) 100%)}
.bchip{position:absolute;top:12px;left:14px;z-index:2;background:rgba(255,255,255,.92);color:var(--gold-deep);
  font-weight:900;font-size:14px;border-radius:999px;padding:5px 16px;box-shadow:0 2px 8px rgba(0,0,0,.18)}
.bdots{position:absolute;top:13px;right:14px;z-index:2;display:flex;gap:5px}
.bdots span{width:16px;height:16px;border-radius:50%;background:rgba(255,255,255,.55);border:1.5px solid rgba(255,255,255,.8);
  display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;color:var(--gold-deep)}
.bdots span.d{background:var(--green);border-color:#fff;color:#fff}
.bdots span.cur{outline:2px solid var(--gold);outline-offset:1px}
/* ナビ立ち絵＋名札 */
.reika{position:absolute;left:14px;bottom:8px;z-index:2;display:flex;align-items:flex-end;gap:10px}
.reika img{width:60px;height:60px;border-radius:50%;object-fit:cover;border:3px solid #fff;box-shadow:0 3px 10px rgba(0,0,0,.28)}
.reika .rn{background:rgba(255,255,255,.92);border-radius:8px;padding:3px 10px;font-weight:800;font-size:12px;color:var(--pink);margin-bottom:6px}

/* 中央コンテンツ */
.content{flex:1;overflow-y:auto;padding:14px 18px 6px;-webkit-overflow-scrolling:touch}
.speech{background:#fdf3f7;border:1px solid rgba(224,86,138,.3);border-radius:14px 14px 14px 4px;
  padding:11px 14px;font-size:14px;position:relative;margin-bottom:12px;cursor:pointer;min-height:44px}
.speech b{color:var(--ink)}
.speech .cur{display:inline-block;animation:blink 1s infinite;color:var(--pink);font-weight:900}
@keyframes blink{50%{opacity:0}}
.stitle{font-weight:900;font-size:17px;color:var(--gold-deep);margin:2px 0 6px;display:flex;align-items:center;gap:8px}
.stitle .em{font-size:22px}
.lead{color:var(--dim);font-size:13px}
.lead b{color:var(--ink)}
.mt{margin-top:10px}
.center{text-align:center}

/* ボタン */
.btn{display:inline-block;background:linear-gradient(180deg,var(--gold-soft),var(--gold));color:#fff;font-weight:800;
  border:none;border-radius:12px;padding:11px 20px;font-size:14px;cursor:pointer;font-family:inherit;text-decoration:none;
  box-shadow:0 3px 10px rgba(184,134,11,.28)}
.btn.cyan{background:linear-gradient(180deg,#3fb4c7,var(--cyan))}
.btn.green{background:linear-gradient(180deg,#5cb267,var(--green))}
.btn.ghost{background:#fff;color:var(--gold-deep);border:1px solid var(--line);box-shadow:none}
.btn.sm{padding:8px 15px;font-size:12.5px}
.btn.big{width:100%;padding:14px;font-size:15px;margin-top:8px}
.btn:disabled{opacity:.4;cursor:default}
.btn:active{transform:translateY(1px)}

/* ストーリー（プロローグ） */
.pro{background:#151220;border-radius:14px;padding:26px 20px;min-height:180px;display:flex;align-items:center;justify-content:center}
.pro .ptx{color:#efe9dc;font-size:15px;line-height:2;text-align:center;max-width:520px}
.pro .ptx b{color:#f5c542}

/* OS選択・ナビ選択 */
.osrow{display:flex;gap:10px;margin-top:6px;flex-wrap:wrap}
.osbtn{flex:1;min-width:130px;background:#faf8f2;border:2px solid var(--line2);border-radius:14px;padding:16px;text-align:center;
  cursor:pointer;font-weight:800;font-size:16px;color:var(--ink)}
.osbtn.sel{border-color:var(--gold);background:#fcf6e6}
.osbtn img{width:56px;height:56px;border-radius:50%;object-fit:cover;border:2px solid var(--line);display:block;margin:0 auto 6px}

/* クイズ */
.choice{background:#faf8f2;border:1.5px solid var(--line2);border-radius:10px;padding:12px 14px;margin-top:8px;cursor:pointer;
  font-size:14px;display:flex;justify-content:space-between;gap:8px}
.choice:hover{border-color:var(--gold)}
.choice.correct{border-color:var(--green);background:#eef7ef}
.choice.wrong{border-color:var(--red);background:#fceceb}
.qexp{font-size:13px;color:var(--ink);background:#fcf6e6;border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-top:10px}
.qcount{font-size:12px;color:var(--dim);font-weight:800}

/* 実践 */
.pracbox{background:#faf8f2;border:1px solid var(--line2);border-radius:10px;padding:11px 13px;margin-top:10px;font-size:13.5px}
.klabel{display:inline-block;background:#fff;border:1px solid #cfd3e0;border-bottom-width:2px;border-radius:6px;padding:1px 8px;
  font-family:Consolas,monospace;font-size:12.5px;color:#3a3f57;margin:0 2px;box-shadow:0 1px 0 rgba(0,0,0,.05)}
textarea,input[type=text]{width:100%;padding:10px 12px;border-radius:10px;border:1.5px solid var(--line2);background:#fff;
  color:var(--ink);font-family:inherit;font-size:14px;margin-top:6px}
textarea:focus,input:focus{outline:none;border-color:var(--gold)}
.okmark{color:var(--green);font-weight:800;font-size:13px}
.pastezone{border:2px dashed var(--line);border-radius:12px;min-height:130px;display:flex;align-items:center;justify-content:center;
  color:var(--dim);font-size:13px;margin-top:8px;padding:10px;text-align:center;outline:none;background:#faf8f2}
.pastezone:focus{border-color:var(--gold);background:#fcf6e6}
.pastezone img{max-width:100%;max-height:220px;border-radius:8px}
.chk{display:flex;gap:10px;align-items:flex-start;background:#faf8f2;border:1px solid var(--line2);border-radius:10px;
  padding:10px 13px;margin-top:8px;cursor:pointer;font-size:13.5px}
.chk input{width:auto;margin-top:3px;flex-shrink:0}

/* ステージ選択（8つの封印の地） */
.smap{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}
@media(max-width:560px){.smap{grid-template-columns:1fr}}
.scard{position:relative;border:2px solid var(--line2);border-radius:14px;overflow:hidden;text-decoration:none;color:#fff;
  min-height:92px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px 12px;
  background:linear-gradient(150deg,#3a4160,#20263f);box-shadow:0 4px 14px rgba(43,48,70,.1)}
.scard:hover{transform:translateY(-2px);border-color:var(--gold)}
.scard .sbg{position:absolute;inset:0;background-size:cover;background-position:center;opacity:.85}
.scard::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,8,20,.05) 30%,rgba(10,8,20,.72) 100%)}
.scard>*{position:relative;z-index:1}
.scard .sk{font-size:11px;font-weight:900;color:#ffd54f;letter-spacing:.08em}
.scard .sr{font-weight:900;font-size:14px;text-shadow:0 1px 3px rgba(0,0,0,.6)}
.scard .sb{font-size:11px;opacity:.9;text-shadow:0 1px 3px rgba(0,0,0,.6)}
.gamma-link{display:block;text-align:center;margin-top:12px;font-size:12.5px}

/* 下部ナビ */
.nav{flex-shrink:0;display:flex;align-items:center;gap:10px;padding:10px 16px;border-top:1px solid var(--line2);background:#fbf9f4}
.nav .lbl{flex:1;text-align:center;font-size:12px;color:var(--dim);font-weight:800}
.nav .btn{min-width:96px;text-align:center}

/* デバッグパネル */
.debug{position:fixed;left:10px;top:10px;z-index:9999;background:rgba(20,20,30,.92);color:#9fe8a5;border:1px solid #4b9e57;
  border-radius:10px;padding:8px 10px;font-size:11px;font-family:Consolas,monospace;display:flex;flex-direction:column;gap:5px;max-width:210px}
.debug button{background:#2b3046;color:#cfe8ff;border:1px solid #556;border-radius:6px;padding:3px 8px;font-size:11px;cursor:pointer;font-family:inherit}
.debug select{font-size:11px;border-radius:6px;padding:2px}

.toast{position:fixed;left:50%;bottom:74px;transform:translateX(-50%);background:var(--gold);color:#fff;font-weight:800;
  border-radius:999px;padding:10px 22px;font-size:13.5px;box-shadow:0 6px 24px rgba(43,48,70,.25);opacity:0;
  transition:opacity .25s;pointer-events:none;z-index:9999}
.toast.on{opacity:1}
.confetti{font-size:2.4rem;text-align:center}
</style>
</head>
<body>
<div class="stage">
  <div class="banner">
    <div class="bchip">🔰 初心者の館</div>
    <div class="bdots" id="bdots"></div>
    <div class="reika">
      <img id="navImg" src="" alt="ナビ">
      <div class="rn" id="navName"></div>
    </div>
  </div>
  <div class="content" id="content"></div>
  <div class="nav">
    <button class="btn ghost sm" id="navBack">← 戻る</button>
    <div class="lbl" id="navLbl"></div>
    <button class="btn sm" id="navNext">次へ →</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="assets/bgm.js"></script>
<script src="data/tutorial_lines.js"></script>
<script>
/* ============================================================
   🔰 初心者の館 — 1画面完結・ゲーム風チュートリアル v2
   セリフは data/tutorial_lines.js（テキスト編集はそちらで）
   デバッグ: URLに ?debug=1
   ============================================================ */
const $=id=>document.getElementById(id);
let toastTimer=null;
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('on');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('on'),2600);}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

const PKEY='mcq_tutorial_beta';
let P={}; try{P=JSON.parse(localStorage.getItem(PKEY)||'{}');}catch(e){}
function saveP(){localStorage.setItem(PKEY,JSON.stringify(P));}
let OS=P.os||'win';
const K=(win,mac)=>OS==='win'?win:mac;
const MOD=()=>K('Ctrl','⌘ Cmd');

/* ---- ナビキャラ ---- */
const NAVS=window.MCQ_NAVIGATORS||{reika:{name:'大塚れいか',img:'https://re-gi.jp/icon/reika_tujo.jpg',color:'#e0568a'}};
const NAVKEYS=Object.keys(NAVS);
let NAV=NAVS[P.nav]||NAVS[NAVKEYS[0]];
function applyNav(){
  $('navImg').src=NAV.img; $('navName').textContent=NAV.name;
  $('navName').style.color=NAV.color||'#e0568a';
}
const LINES=window.MCQ_TUTORIAL_LINES||{};
const PRO=window.MCQ_PROLOGUE||[];
const STAGES=window.MCQ_STAGES||[];
function line(key,vars){
  let t=LINES[key]||'';
  t=t.replace(/\{navName\}/g,NAV.name).replace(/\{name\}/g,'挑戦者');
  if(vars)Object.keys(vars).forEach(k=>{t=t.replace(new RegExp('\\{'+k+'\\}','g'),vars[k]);});
  return t;
}

/* ---- タイプライター＋ブリップ（ドラクエ風） ---- */
let typing=null;
function typeSpeech(el,html,done){
  // htmlタグを保ったまま1文字ずつ表示
  if(typing){clearInterval(typing);typing=null;}
  const src=html;
  let i=0, out='';
  el.innerHTML='';
  const step=()=>{
    // タグはまとめて追加
    if(src[i]==='<'){const j=src.indexOf('>',i);out+=src.slice(i,j+1);i=j+1;}
    else{out+=src[i];i++;
      if(window.MCQBgm && i%2===0) MCQBgm.blip();}
    el.innerHTML=out+'<span class="cur">▼</span>';
    if(i>=src.length){clearInterval(typing);typing=null;el.innerHTML=out;if(done)done();}
  };
  typing=setInterval(step,26);
  el.onclick=()=>{if(typing){clearInterval(typing);typing=null;el.innerHTML=src;if(done)done();}};
}

function isDone(id){return !!P['m'+id];}
function setDone(id){ if(isDone(id))return; P['m'+id]=true; saveP();
  if(window.MCQBgm)MCQBgm.se('ok'); toast('✅ ミッション'+id+' クリア！'); }

/* ---- ミッション2クイズ ---- */
function quiz2(){return [
  {q:'パソコンの画面全体、いろんなものを置ける「机の上」にあたる場所は？',
   c:['デスクトップ','スクリーンセーバー','ゴミ箱','壁紙ストア'],a:0,
   e:'電源を入れて最初に見える画面がデスクトップ。机の上と同じで、散らかすと探し物が増えるわ。'},
  {q:'インターネットのページを見るためのソフトはどれ？',
   c:[K('Chrome（クローム）','Safari や Chrome'),'Excel（エクセル）','メモ帳','電卓'],a:0,
   e:'ページを見るソフトを「ブラウザ」と呼ぶの。'+K('WindowsならChromeやEdge。','MacならSafari、Chromeも使えるわ。')+'クエストは全部ブラウザで進むわよ。'},
  {q:'たくさんの書類（ファイル）を整理してまとめて入れる「箱」の名前は？',
   c:['フォルダ','クッキー','タブ','アイコン'],a:0,
   e:'ファイル＝1枚の書類、フォルダ＝書類を入れる箱。箱に名前を付けて仕分けるのが整理の第一歩。'},
  {q:'インターネットから受け取ったファイルが、最初に入る場所はどこが多い？',
   c:['「ダウンロード」フォルダ','ゴミ箱','デスクトップの裏','USBメモリ'],a:0,
   e:'「あのファイルどこ！？」の答えは大体ここ。'+K('エクスプローラー','Finder')+'の「ダウンロード」を見る癖をつけてね。'},
  {q:K('画面の下にある、開いているアプリが並ぶ帯の名前は？','画面の下にある、アプリのアイコンが並ぶ帯の名前は？'),
   c:[K('タスクバー','Dock（ドック）'),'ツールベルト','アプリ棚','ステータスバー'],a:0,
   e:K('タスクバーには今開いているアプリが並ぶの。右端の小さいアイコン群は「タスクトレイ」。','Dockにはよく使うアプリを並べられるの。')}
];}

/* ============================================================
   ステップ構成
   ============================================================ */
let STEPS=[];
function buildSteps(){
  STEPS=[];
  if(!P.prologueSeen){ PRO.forEach((b,i)=>STEPS.push({k:'pro',pi:i})); }
  if(NAVKEYS.length>1 && !P.nav) STEPS.push({k:'navpick'});
  STEPS.push({k:'welcome'},{k:'os'},{k:'m1'},{k:'m2intro'},
    {k:'m2q',qi:0},{k:'m2q',qi:1},{k:'m2q',qi:2},{k:'m2q',qi:3},{k:'m2q',qi:4},
    {k:'m2result'},{k:'m3'},{k:'m4'},{k:'grad'},
    {k:'m5'},{k:'m6'},{k:'m7'},{k:'m8'},{k:'pick'});
}
let idx=0;
let q2=[0,0,0,0,0].map(()=>({picked:null,order:null}));
let m3={copy:false,paste:false,cut:false};

/* ============================================================
   画面レンダリング
   ============================================================ */
function screen(){
  const s=STEPS[idx];
  const C=$('content');
  let reika='', title='', body='', canNext=true, nextLbl='次へ →', backOK=idx>0, hideSpeech=false;

  switch(s.k){
    case 'pro':{
      const b=PRO[s.pi];
      hideSpeech=true;
      title='';
      const txt=(b.text||'').replace(/\{navName\}/g,NAV.name);
      body='<div class="pro"><div class="ptx" id="proTx"></div></div>'
        +'<p class="center mt"><button class="btn ghost sm" id="proSkip">⏭ ストーリーをスキップ</button></p>';
      nextLbl='▼ 次へ';
      setTimeout(()=>{const el=$('proTx');if(el)typeSpeech(el,(b.t==='say'?'💬 ':'')+txt);},30);
      break;}

    case 'navpick':
      reika='この館には案内役がいるの。<b>誰と一緒に冒険する？</b>（あとから変えられるわ）';
      title='<span class="em">🧭</span>ナビを選ぼう';
      body='<div class="osrow">'+NAVKEYS.map(k=>{
        const n=NAVS[k];
        return '<div class="osbtn'+(NAV===n?' sel':'')+'" data-nav="'+k+'"><img src="'+esc(n.img)+'">'+esc(n.name)+'</div>';
      }).join('')+'</div>';
      break;

    case 'welcome':
      reika=line('welcome');
      title='<span class="em">🏠</span>初心者の館';
      body='<p class="lead">古民家をリノベした、みんなの学び舎。あわてなくて大丈夫、1画面ずつ進めばいいの。'
          +'<br><br>所要時間：必修4つで<b>約10分</b>。</p>'
          +'<p class="mt"><button class="btn ghost sm" id="replayPro">▶ 冒頭ストーリーをもう一度見る</button></p>';
      nextLbl='はじめる →'; backOK=false;
      break;

    case 'os':
      reika=line('os');
      title='<span class="em">💻</span>あなたのパソコンは？';
      body='<div class="osrow">'
        +'<div class="osbtn'+(OS==='win'?' sel':'')+'" data-os="win">🪟<br>Windows</div>'
        +'<div class="osbtn'+(OS==='mac'?' sel':'')+'" data-os="mac">🍎<br>Mac</div></div>'
        +'<p class="lead mt">迷ったら…画面の左下に「田」みたいなマークがあれば Windows、上に🍎マークがあれば Mac よ。</p>';
      break;

    case 'm1':{
      const hasCard=(()=>{try{const c=JSON.parse(localStorage.getItem('mcq_card_beta')||'{}');return !!(c.name&&c.skillName);}catch(e){return false;}})();
      reika=line('m1');
      title='<span class="em">🃏</span>① 挑戦者カードを作る';
      body='<a class="btn big" href="card.html">🃏 挑戦者カードを作りに行く</a>'
        +'<p class="lead mt center">状態：'+(hasCard?'<span class="okmark">✅ 作成済み！</span>':'まだ作っていません')+'</p>'
        +(hasCard?'':'<p class="lead mt center">※先に作るのがおすすめ。今はスキップして先へ進むこともできるわ。</p>');
      if(hasCard&&!isDone(1)){setDone(1);}
      break;}

    case 'm2intro':
      reika=line('m2intro');
      title='<span class="em">🧠</span>② パソコン基礎クイズ（全5問）';
      body='<p class="lead">これから1問ずつ出すわ。答えを選んだら「次へ」で進んでね。半分（3問）以上正解で合格よ。</p>';
      nextLbl='第1問へ →';
      break;

    case 'm2q':{
      const Q=quiz2(),item=Q[s.qi],st=q2[s.qi];
      if(!st.order)st.order=shuffle(item.c.length);
      reika=line('m2q',{q:s.qi+1});
      title='<span class="em">🧠</span>クイズ '+(s.qi+1)+' / 5';
      body='<div class="qcount">Q'+(s.qi+1)+'</div><p style="font-weight:800;font-size:15px;margin:4px 0 4px">'+esc(item.q)+'</p>';
      st.order.forEach(ci=>{
        const cls=st.picked!=null?(ci===item.a?' correct':(ci===st.picked?' wrong':'')):'';
        const mk=st.picked!=null?(ci===item.a?'◯':(ci===st.picked?'✕':'')):'';
        body+='<div class="choice'+cls+'" data-ci="'+ci+'">'+esc(item.c[ci])+'<span>'+mk+'</span></div>';
      });
      if(st.picked!=null) body+='<div class="qexp">💬 '+esc(NAV.name)+'：'+esc(item.e)+'</div>';
      canNext=st.picked!=null;
      nextLbl=(s.qi<4?'次の問題 →':'結果を見る →');
      break;}

    case 'm2result':{
      const Q=quiz2();
      const ok=q2.reduce((n,st,i)=>n+((st.picked===Q[i].a)?1:0),0);
      const pass=ok>=3;
      reika=pass?line('m2pass'):line('m2fail');
      title='<span class="em">'+(pass?'🎉':'💪')+'</span>クイズ結果';
      body='<div class="confetti">'+(pass?'🎉':'📚')+'</div>'
        +'<p class="center" style="font-size:20px;font-weight:900">'+ok+' / 5 問 正解！</p>'
        +'<p class="lead center">'+(pass?'ミッション②クリア！':'3問以上で合格。もう一度挑戦しよう。')+'</p>'
        +(pass?'':'<button class="btn ghost big" id="q2retry">🔁 もう一度挑戦する</button>');
      if(pass&&!isDone(2)){setDone(2);if(window.MCQBgm)MCQBgm.se('fanfare');}
      canNext=pass; nextLbl='③へ進む →';
      break;}

    case 'm3':
      reika=line('m3');
      title='<span class="em">⌨️</span>③ ショートカットをやってみる';
      body='<div class="pracbox">① 下の文を <span class="klabel">'+MOD()+' + A</span> で全選択 → <span class="klabel">'+MOD()+' + C</span> でコピー'
        +'<textarea id="m3src" rows="1" readonly style="cursor:text">ガグるな、自分で考えよう。</textarea>'
        +'<div id="m3s1">'+(m3.copy?'<span class="okmark">✅ コピーできた！</span>':'<span class="lead">待ってるわよ…</span>')+'</div></div>'
        +'<div class="pracbox">② ここに <span class="klabel">'+MOD()+' + V</span> で貼り付け'
        +'<textarea id="m3dst" rows="1" placeholder="ここをクリックして貼り付け"></textarea>'
        +'<div id="m3s2">'+(m3.paste?'<span class="okmark">✅ 貼り付けできた！</span>':'')+'</div></div>'
        +'<div class="pracbox">③ 下の文を全選択して <span class="klabel">'+MOD()+' + X</span>（消えたら成功）'
        +'<textarea id="m3cut" rows="1">この文を切り取ってみて</textarea>'
        +'<div id="m3s3">'+(m3.cut?'<span class="okmark">✅ 切り取りできた！</span>':'')+'</div></div>'
        +(isDone(3)?'':'<p class="lead mt center">うまく検知されない時は <button class="btn ghost sm" id="m3manual">できたので次へ</button></p>');
      canNext=isDone(3); nextLbl='④へ進む →';
      break;

    case 'm4':
      reika=line('m4');
      title='<span class="em">📸</span>④ スクリーンショットを貼る';
      body='<div class="pracbox">① '+K('<span class="klabel">Win + Shift + S</span> を押して範囲をドラッグ','<span class="klabel">⌘ + Shift + Ctrl + 4</span> を押して範囲をドラッグ')+'</div>'
        +'<p class="lead mt">② 下の枠をクリックして <span class="klabel">'+MOD()+' + V</span> で貼り付け！</p>'
        +'<div class="pastezone" id="pz" tabindex="0">ここをクリックして '+MOD()+'+V で貼り付け</div>'
        +'<div class="center mt"><label class="btn ghost sm">📁 ファイルから選ぶ<input type="file" id="pzFile" accept="image/*" hidden></label></div>';
      canNext=isDone(4); nextLbl='修了 🎓';
      break;

    case 'grad':
      reika=line('grad');
      title='<span class="em">🎓</span>初心者の館・修了！';
      body='<div class="confetti">🎓✨</div>'
        +'<p class="lead center">必修①〜④クリア。基本装備が整いました。</p>'
        +'<button class="btn big" id="goBonus">🎁 おまけの便利ワザ4つもやる（推奨）</button>'
        +'<button class="btn ghost big" id="goPick">🗾 ステージを選んで冒険に出る</button>';
      canNext=false;
      break;

    case 'm5':
      reika=line('m5');
      title='<span class="em">🎤</span>⑤ 音声入力を使う（おまけ）';
      body='<p class="lead">'+K('文字を入れたい所をクリック → <span class="klabel">Win + H</span> でマイク起動。しゃべると文字になるわ。','文字を入れたい所をクリック →「編集」→「音声入力を開始」（または <span class="klabel">fn</span> を2回）。')+'</p>'
        +'<div class="pracbox">下の枠に、<b>声で1文</b>入れてみて（例：「今日はいい天気です」）'
        +'<textarea id="m5t" rows="2" placeholder="ここに音声で入力"></textarea>'
        +'<div id="m5s"></div></div>'
        +'<p class="lead mt">💡 実践報告の感想も声で入れれば爆速。誤字はあとでAIに直させればいいの。</p>';
      nextLbl='⑥へ →';
      break;

    case 'm6':
      reika=line('m6');
      title='<span class="em">📌</span>⑥ ピン留めする（おまけ）';
      body=checklist(6,OS==='win'?[
        'よく使うアプリを<b>タスクバーにピン留め</b>（アイコンを右クリック →「タスクバーにピン留めする」）',
        'よく使うフォルダを<b>クイックアクセスにピン留め</b>（フォルダを右クリック →「クイック アクセスにピン留め」）',
        '<b>タスクトレイ（右下の小さいアイコン群）</b>を開いて中身を確認（△をクリック）'
      ]:[
        'よく使うアプリを<b>Dockに追加</b>（起動中アイコンを右クリック →「オプション」→「Dockに追加」）',
        'よく使うフォルダを<b>Finderサイドバーに追加</b>（フォルダをサイドバーへドラッグ）',
        '<b>メニューバー（右上）</b>のアイコンを確認（Wi-Fi・電池・常駐アプリ）'
      ]);
      nextLbl='⑦へ →';
      break;

    case 'm7':
      reika=line('m7');
      title='<span class="em">📹</span>⑦ Meetの操作（おまけ）';
      body='<p class="lead"><a href="https://meet.google.com/" target="_blank" rel="noopener">Google Meet</a> で会議を作って3つ試してみて。</p>'
        +checklist(7,[
          '<b>マイクのオン／オフ</b>（🎤ボタン。<span class="klabel">'+K('Ctrl+D','⌘+D')+'</span>）',
          '<b>画面共有</b>（「画面を共有」→ <b>タブ</b>か<b>ウィンドウ</b>を選ぶ）',
          '<b>音声つき共有</b>（「タブ」を選ぶと「タブの音声も共有」が出る。動画を見せる時はこれ！）'
        ])
        +'<p class="lead mt">💡 手伝ってくれた仲間には、ボードの「🍙サンクスUP!」で感謝を送ってね。</p>';
      nextLbl='⑧へ →';
      break;

    case 'm8':
      reika=line('m8');
      title='<span class="em">📦</span>⑧ 安全なインストール（おまけ）';
      body='<p class="lead"><b>3か条</b>：①必ず<b>公式サイト</b>から（偽の検索広告に注意）②URLをよく見る③途中の「許可しますか？」は読んでから</p>'
        +checklist(8,[
          '入れるソフトを1つ決めた（例：<a href="https://claude.ai/download" target="_blank" rel="noopener">Claudeアプリ</a>／<a href="https://www.google.com/intl/ja/chrome/" target="_blank" rel="noopener">Chrome</a> など）',
          '<b>公式サイトから</b>ダウンロードした（URLを確認）',
          'インストールして起動できた'
        ]);
      nextLbl='ステージ選択へ →';
      break;

    case 'pick':
      reika=line('pick');
      title='<span class="em">🗾</span>ステージ選択 — 8つの封印の地';
      body='<div class="smap">'+STAGES.map(st=>{
        return '<a class="scard" href="index.html?area='+st.key+'">'
          +'<span class="sbg" style="background-image:url(\'assets/stages/'+st.key+'.png\')"></span>'
          +'<span class="sk">STAGE '+st.key+'</span>'
          +'<span class="sr">'+st.emoji+' '+esc(st.region)+'</span>'
          +'<span class="sb">主：'+esc(st.boss)+'｜'+esc(st.title)+'</span></a>';
      }).join('')+'</div>'
      +'<a class="gamma-link" href="claude64/index.html">🌑 第2部・西日本編（Claude64）はこちら →</a>';
      canNext=false;
      break;
  }

  C.innerHTML=(hideSpeech?'':'<div class="speech" id="speech"></div>')
    +(title?'<div class="stitle">'+title+'</div>':'')+body;
  C.scrollTop=0;
  applyNav();
  if(!hideSpeech){ const sp=$('speech'); if(sp) typeSpeech(sp,'💬 '+reika); }

  // ナビボタン
  $('navBack').style.visibility=backOK?'visible':'hidden';
  const nb=$('navNext');
  nb.style.display=(s.k==='grad'||s.k==='pick')?'none':'';
  nb.textContent=nextLbl; nb.disabled=!canNext;
  $('navLbl').textContent=labelFor(s);
  renderDots();
  bindScreen(s);
}

function labelFor(s){
  if(s.k==='pro')return 'ストーリー '+(s.pi+1)+'/'+PRO.length;
  if(s.k==='navpick')return 'ナビ選択';
  if(s.k==='welcome')return 'ようこそ';
  if(s.k==='os')return '準備';
  if(s.k.startsWith('m2'))return 'ミッション②';
  if(/^m[1345678]$/.test(s.k))return 'ミッション'+s.k.slice(1);
  if(s.k==='grad')return '修了';
  if(s.k==='pick')return 'ステージ選択';
  return '';
}

function renderDots(){
  let h='';
  for(let i=1;i<=8;i++){
    const cur=STEPS[idx].k==='m'+i||(i===2&&STEPS[idx].k.startsWith('m2'));
    h+='<span class="'+(isDone(i)?'d ':'')+(cur?'cur':'')+'">'+(isDone(i)?'✓':i)+'</span>';
  }
  $('bdots').innerHTML=h;
}

/* ---- イベント ---- */
function bindScreen(s){
  if(s.k==='pro'){
    const sk=$('proSkip'); if(sk)sk.onclick=()=>{P.prologueSeen=true;saveP();buildSteps();idx=STEPS.findIndex(x=>x.k==='welcome');screen();};
    if(s.pi===PRO.length-1){ // 最後のページの「次へ」で見終わり扱い
      $('navNext').onclick=()=>{P.prologueSeen=true;saveP();buildSteps();idx=STEPS.findIndex(x=>x.k==='welcome');screen();
        $('navNext').onclick=()=>goTo(idx+1);};
    }
  }
  if(s.k==='navpick'){
    document.querySelectorAll('[data-nav]').forEach(b=>b.onclick=()=>{
      P.nav=b.dataset.nav;saveP();NAV=NAVS[P.nav];applyNav();screen();
    });
  }
  if(s.k==='welcome'){
    const rp=$('replayPro'); if(rp)rp.onclick=()=>{P.prologueSeen=false;saveP();buildSteps();idx=0;screen();};
  }
  if(s.k==='os'){
    document.querySelectorAll('[data-os]').forEach(b=>b.onclick=()=>{OS=b.dataset.os;P.os=OS;saveP();screen();});
  }
  if(s.k==='m2q'){
    const st=q2[s.qi];
    if(st.picked==null){
      document.querySelectorAll('.choice').forEach(ch=>ch.onclick=()=>{
        st.picked=+ch.dataset.ci;
        if(window.MCQBgm)MCQBgm.se(st.picked===quiz2()[s.qi].a?'ok':'ng');
        screen();
      });
    }
  }
  if(s.k==='m2result'){
    const r=$('q2retry'); if(r)r.onclick=()=>{q2=q2.map(()=>({picked:null,order:null}));goTo(STEPS.findIndex(x=>x.k==='m2q'&&x.qi===0));};
  }
  if(s.k==='m3'){
    const src=$('m3src'),dst=$('m3dst'),cut=$('m3cut');
    if(src){
      src.addEventListener('copy',()=>{m3.copy=true;$('m3s1').innerHTML='<span class="okmark">✅ コピーできた！</span>';chk3();});
      dst.addEventListener('paste',()=>setTimeout(()=>{m3.paste=true;$('m3s2').innerHTML='<span class="okmark">✅ 貼り付けできた！</span>';chk3();},50));
      cut.addEventListener('cut',()=>setTimeout(()=>{m3.cut=true;$('m3s3').innerHTML='<span class="okmark">✅ 切り取りできた！</span>';chk3();},50));
    }
    const man=$('m3manual'); if(man)man.onclick=()=>{setDone(3);screen();};
  }
  if(s.k==='m4'){
    const pz=$('pz');
    if(pz){
      const ok=src=>{pz.innerHTML='<img src="'+src+'" alt="">';if(!isDone(4)){setDone(4);}screen();};
      pz.addEventListener('paste',e=>{
        const items=(e.clipboardData||{}).items||[];
        for(const it of items){if(it.type&&it.type.indexOf('image')===0){
          const f=it.getAsFile();const r=new FileReader();r.onload=()=>ok(r.result);r.readAsDataURL(f);e.preventDefault();return;}}
        toast('画像が入ってないみたい。もう一度スクショを撮ってね');
      });
      pz.addEventListener('click',()=>pz.focus());
      $('pzFile').addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>ok(r.result);r.readAsDataURL(f);});
    }
  }
  if(s.k==='m5'){
    const t=$('m5t'); if(t)t.addEventListener('input',()=>{
      if(t.value.trim().length>=5){$('m5s').innerHTML='<span class="okmark">✅ 入力できた！</span>';if(!isDone(5))setDone(5);}
    });
  }
  if(/^m[678]$/.test(s.k)){
    const id=+s.k.slice(1);
    document.querySelectorAll('input[data-cid="'+id+'"]').forEach(cb=>cb.addEventListener('change',()=>{
      const st=P['c'+id]||{};st[cb.dataset.ci]=cb.checked;P['c'+id]=st;saveP();
      if(Object.keys(st).filter(k=>st[k]).length>=3&&!isDone(id))setDone(id);
    }));
  }
  if(s.k==='grad'){
    $('goBonus').onclick=()=>goTo(STEPS.findIndex(x=>x.k==='m5'));
    $('goPick').onclick=()=>goTo(STEPS.findIndex(x=>x.k==='pick'));
  }
}
function chk3(){if(m3.copy&&m3.paste&&m3.cut){if(!isDone(3))setDone(3);screen();}}

function checklist(id,items){
  const st=P['c'+id]||{};
  return items.map((it,i)=>'<label class="chk"><input type="checkbox" data-cid="'+id+'" data-ci="'+i+'" '+(st[i]?'checked':'')+'><span>'+it+'</span></label>').join('');
}
function shuffle(n){const a=[...Array(n).keys()];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

/* ---- ナビゲーション ---- */
function goTo(i){idx=Math.max(0,Math.min(STEPS.length-1,i));screen();}
$('navNext').onclick=()=>goTo(idx+1);
$('navBack').onclick=()=>goTo(idx-1);

/* ---- デバッグモード（?debug=1） ---- */
function buildDebug(){
  const d=document.createElement('div');d.className='debug';
  d.innerHTML='<b>🛠 DEBUG</b>'
    +'<div><button id="dbAll">全ミッションクリア</button> <button id="dbReset">全リセット</button></div>'
    +'<div>ジャンプ: <select id="dbJump"></select></div>'
    +'<div><button id="dbSe">SE試聴</button> <button id="dbFan">🎉音</button> <button id="dbBlip">喋り音</button></div>'
    +'<div id="dbInfo"></div>';
  document.body.appendChild(d);
  const sel=d.querySelector('#dbJump');
  STEPS.forEach((s,i)=>{const o=document.createElement('option');o.value=i;o.textContent=i+': '+s.k+(s.qi!=null?'-'+s.qi:'');sel.appendChild(o);});
  sel.onchange=()=>goTo(+sel.value);
  d.querySelector('#dbAll').onclick=()=>{for(let i=1;i<=8;i++)P['m'+i]=true;P.prologueSeen=true;saveP();buildSteps();screen();toast('DEBUG: 全クリア');};
  d.querySelector('#dbReset').onclick=()=>{localStorage.removeItem(PKEY);P={};OS='win';q2=q2.map(()=>({picked:null,order:null}));m3={copy:false,paste:false,cut:false};buildSteps();idx=0;screen();toast('DEBUG: リセット');};
  d.querySelector('#dbSe').onclick=()=>MCQBgm&&MCQBgm.se('ok');
  d.querySelector('#dbFan').onclick=()=>MCQBgm&&MCQBgm.se('fanfare');
  d.querySelector('#dbBlip').onclick=()=>MCQBgm&&MCQBgm.blip();
  setInterval(()=>{const i=d.querySelector('#dbInfo');if(i)i.textContent='step:'+idx+' os:'+OS+' done:'+[1,2,3,4,5,6,7,8].filter(isDone).join(',');},600);
}

/* ---- 初期化 ---- */
(function(){
  try{const c=JSON.parse(localStorage.getItem('mcq_card_beta')||'{}');if(c.name&&c.skillName&&!isDone(1)){P.m1=true;saveP();}}catch(e){}
  buildSteps(); idx=0; screen();
  if(window.MCQBgm) MCQBgm.play('tutorial');   // assets/bgm/tutorial.mp3（未配置なら無音）
  if(new URLSearchParams(location.search).get('debug')==='1') buildDebug();
})();
</script>
