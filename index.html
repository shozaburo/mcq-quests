<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>β Google64 マンダラチャートクエスト | みんなのAI実践塾</title>
<style>
  :root{--gold:#FFD700; --muted:#9aa3b5; --ink:#1a2233;}
  *{box-sizing:border-box;}
  body{font-family:system-ui,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    background:#14101c; margin:0; color:#f2f0ea; line-height:1.6;
    padding:18px 10px 60px; display:flex; flex-direction:column; align-items:center;}
  .wrap{width:100%; max-width:1020px;}

  header{text-align:center; margin-bottom:14px;}
  header .goal{display:inline-block; background:rgba(255,215,0,.12); border:1px solid rgba(255,215,0,.4);
    color:var(--gold); border-radius:999px; padding:2px 16px; font-weight:800; letter-spacing:.12em; font-size:.8rem;}
  header h1{margin:8px 0 2px; font-size:1.45rem; font-weight:900; text-shadow:0 2px 8px rgba(0,0,0,.6);}
  header p{margin:0; font-size:.83rem; color:var(--muted);}

  /* 全体進捗バー */
  .overall{max-width:760px; margin:10px auto 14px; display:flex; align-items:center; gap:10px; padding:0 6px;}
  .overall .lbl{font-size:.75rem; color:var(--muted); flex-shrink:0;}
  .overall .bar{flex:1; height:9px; background:rgba(255,255,255,.08); border-radius:5px; overflow:hidden;}
  .overall .bar i{display:block; height:100%; background:linear-gradient(90deg,#f57c00,var(--gold)); transition:width .6s;}
  .overall .val{font-size:.82rem; color:var(--gold); font-weight:800; flex-shrink:0;}

  /* ===== 9×9 マンダラ ===== */
  .board-scroll{overflow-x:auto; padding-bottom:8px; -webkit-overflow-scrolling:touch;}
  .grid{display:grid; grid-template-columns:repeat(9,1fr); gap:4px;
    min-width:720px; max-width:1000px; margin:0 auto; padding:10px;
    border-radius:18px; position:relative;
    background-color:#221833;
    background-size:cover; background-position:center;
    box-shadow:0 0 40px rgba(255,215,0,.18), inset 0 0 60px rgba(0,0,0,.5);}
  /* エリア境界をはっきり空ける（8つの塊に見せる） */
  .grid > *:nth-child(9n+4), .grid > *:nth-child(9n+7){margin-left:9px;}
  .grid > *:nth-child(n+28):nth-child(-n+36),
  .grid > *:nth-child(n+55):nth-child(-n+63){margin-top:9px;}

  .cell{aspect-ratio:1; border-radius:9px; position:relative; overflow:hidden;
    display:flex; flex-direction:column; justify-content:flex-start;}

  /* クエストセル（暗タイル。進捗で透けて下の絵が見える） */
  a.qcell{color:#fff; text-decoration:none; padding:5px 6px; font-size:.6rem; line-height:1.35;
    border:1px solid rgba(255,255,255,.14); transition:border .15s, transform .1s;}
  a.qcell:hover{border-color:var(--gold); transform:scale(1.03); z-index:2;}
  a.qcell .qid{font-weight:900; font-size:.72rem; color:#ffd54f; text-shadow:0 1px 2px rgba(0,0,0,.8);}
  a.qcell .nm{font-weight:700; text-shadow:0 1px 3px rgba(0,0,0,.9); overflow:hidden;
    display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical;}
  a.qcell .step{position:absolute; right:4px; top:3px; font-size:.58rem; font-weight:900;
    color:rgba(255,255,255,.75); background:rgba(0,0,0,.4); border-radius:99px;
    width:15px; height:15px; display:flex; align-items:center; justify-content:center;}
  a.qcell .pctb{position:absolute; left:0; right:0; bottom:0; height:3px; background:rgba(0,0,0,.35);}
  a.qcell .pctb i{display:block; height:100%; background:linear-gradient(90deg,#f57c00,var(--gold));}
  a.qcell.full{border-color:rgba(255,215,0,.75); box-shadow:inset 0 0 14px rgba(255,215,0,.35);}
  a.qcell.full .nm,{opacity:.85;}
  a.qcell.full::after{content:"✨"; position:absolute; right:4px; bottom:4px; font-size:.75rem;}

  /* エリア中心（ガイドキャラ＋学習タイトル） */
  .gate{background:rgba(10,6,18,.78); border:1.5px solid rgba(255,215,0,.4);
    align-items:center; justify-content:center; text-align:center; padding:4px; gap:2px;}
  .gate img{width:44%; aspect-ratio:1; border-radius:50%; object-fit:cover; object-position:top;
    border:2px solid rgba(255,215,0,.6);}
  .gate .stp{font-size:.55rem; font-weight:900; color:#fff; letter-spacing:.06em; text-shadow:0 1px 2px #000;}
  .gate .ttl{font-size:.62rem; font-weight:900; line-height:1.22; text-shadow:0 1px 3px #000; color:#fff;}
  .gate .astamp{position:absolute; left:5px; top:3px; font-size:1.4rem; font-weight:900;
    color:rgba(255,255,255,.35); line-height:1;}

  /* 中央3×3（エリアラベル＋キャッチ） */
  .alabel{background:rgba(20,12,34,.82); border:1px solid rgba(255,255,255,.18);
    align-items:center; justify-content:center; text-align:center; padding:4px; gap:1px;
    color:#fff; text-decoration:none;}
  .alabel:hover{border-color:var(--gold);}
  .alabel .stp{font-size:.55rem; font-weight:900; color:var(--gold);}
  .alabel .a{font-size:1rem; font-weight:900;}
  .alabel .t{font-size:.55rem; font-weight:700; line-height:1.25; color:#e8e2d5;}
  .center{background:radial-gradient(circle at 50% 35%, rgba(255,215,0,.28), rgba(20,10,40,.9) 70%);
    border:2px solid var(--gold); align-items:center; justify-content:center; text-align:center; padding:6px; gap:3px;
    box-shadow:0 0 24px rgba(255,215,0,.35);}
  .center .c1{font-size:.78rem; font-weight:900; color:var(--gold); line-height:1.3; text-shadow:0 1px 4px #000;}
  .center .c2{font-size:.53rem; color:#f4ecd8; line-height:1.3;}

  /* 凡例 */
  .legend{max-width:760px; margin:16px auto 0; display:flex; gap:14px; flex-wrap:wrap;
    justify-content:center; align-items:center; font-size:.75rem; color:var(--muted);}
  .legend .mini{display:grid; grid-template-columns:repeat(3,20px); gap:2px;}
  .legend .mini span{width:20px; height:20px; border-radius:4px; background:rgba(255,255,255,.09);
    display:flex; align-items:center; justify-content:center; font-size:.6rem; font-weight:800; color:#ffd54f;}
  .legend .mini span.c{background:rgba(255,215,0,.25);}
  .legend .item{display:flex; align-items:center; gap:7px;}
  .legend .sw{width:16px; height:16px; border-radius:4px; flex-shrink:0;}

  footer{text-align:center; color:var(--muted); font-size:.74rem; margin-top:22px;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <span class="goal">β GOAL ─ GOOGLE 64</span>
    <h1 id="centerCatch">Google賢者になろう</h1>
    <p>動画で学び、クイズで試し、実践で位を上げる。みんなの力でタイルを開放し、隠された絵を完成させよ！</p>
  </header>

  <div class="overall">
    <span class="lbl">全体開放</span>
    <div class="bar"><i id="overallBar" style="width:0%"></i></div>
    <span class="val" id="overallVal">0%</span>
  </div>

  <div class="board-scroll"><div class="grid" id="grid"></div></div>

  <div class="legend">
    <div class="item">
      <div class="mini">
        <span>6</span><span>3</span><span>7</span>
        <span>2</span><span class="c">★</span><span>4</span>
        <span>5</span><span>1</span><span>8</span>
      </div>
      <div>マンダラの型<br>（①→⑧の順で進む）</div>
    </div>
    <div class="item"><span class="sw" style="background:rgba(34,24,51,.95);border:1px solid rgba(255,255,255,.2)"></span>未開放（暗いタイル）</div>
    <div class="item"><span class="sw" style="background:linear-gradient(135deg,rgba(255,215,0,.5),rgba(34,24,51,.3));border:1px solid #ffd700"></span>チーム累積<b id="thLabel">400</b>%で開放✨</div>
  </div>

  <footer>みんなのAI実践塾 ｜ マンダラチャートクエスト</footer>
</div>

<script src="data/config.js"></script>
<script src="data/characters.js"></script>
<script src="data/areas.js"></script>
<script src="data/progress.js"></script>
<script src="data/quests/A.js"></script>
<script src="data/quests/B.js"></script>
<script src="data/quests/C.js"></script>
<script src="data/quests/D.js"></script>
<script src="data/quests/E.js"></script>
<script src="data/quests/F.js"></script>
<script src="data/quests/G.js"></script>
<script src="data/quests/H.js"></script>
<script>
(function(){
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

  var CFG    = window.MCQ_CONFIG || {};
  var CHARS  = window.MCQ_CHARS || {};
  var AREAS  = window.MCQ_AREAS || {};
  var CENTER = window.MCQ_CENTER || {catch:"Google賢者になろう", sub:""};
  var QUESTS = window.MCQ_QUESTS || {};
  var PROG   = window.MCQ_PROGRESS || {threshold:400, cumPct:{}};
  var TH     = PROG.threshold || (CFG.board && CFG.board.threshold) || 400;
  var CUM    = PROG.cumPct || {};

  document.getElementById('centerCatch').textContent = CENTER.catch;
  document.getElementById('thLabel').textContent = TH;

  /* 既存GAS(members_page)と同じ配置定義 */
  var AREA_POS  = {F:[0,0], C:[0,1], G:[0,2], B:[1,0], D:[1,2], E:[2,0], A:[2,1], H:[2,2]};
  var QUEST_POS = {6:[0,0], 3:[0,1], 7:[0,2], 2:[1,0], 4:[1,2], 5:[2,0], 1:[2,1], 8:[2,2]};
  var CENTER_GRID = [['F','C','G'],['B','*','D'],['E','A','H']];

  /* 背景イラスト */
  var grid = document.getElementById('grid');
  if(CFG.board && CFG.board.imageUrl){
    grid.style.backgroundImage = "url('" + CFG.board.imageUrl.replace(/'/g,"%27") + "')";
  }

  /* fill比率 → タイルの透け具合（既存GASと同式: alpha 0.95 → 0.05） */
  function fillRatio(qid){ return Math.min(1, (CUM[qid]||0)/TH); }
  function tileBg(ratio){ var a=(0.95 - ratio*0.90).toFixed(3); return 'rgba(22,14,36,'+a+')'; }

  /* エリア平均・全体 */
  var areaAvg = {};
  Object.keys(AREA_POS).forEach(function(a){
    var s=0; for(var n=1;n<=8;n++) s+=fillRatio(a+n);
    areaAvg[a]=s/8;
  });
  var overall = Object.keys(areaAvg).reduce(function(s,a){return s+areaAvg[a];},0)/8;
  document.getElementById('overallBar').style.width = Math.round(overall*100)+'%';
  document.getElementById('overallVal').textContent = Math.round(overall*100)+'%';

  /* 9×9セルを組む */
  var cells=[]; for(var r=0;r<9;r++) cells.push(new Array(9).fill(null));

  Object.keys(AREA_POS).forEach(function(area){
    var ap=AREA_POS[area];
    for(var n=1;n<=8;n++){
      var ip=QUEST_POS[n];
      cells[ap[0]*3+ip[0]][ap[1]*3+ip[1]] = {t:'q', qid:area+n, n:n};
    }
    cells[ap[0]*3+1][ap[1]*3+1] = {t:'gate', area:area};
  });
  for(var rr=0;rr<3;rr++) for(var cc=0;cc<3;cc++){
    var v=CENTER_GRID[rr][cc];
    cells[3+rr][3+cc] = (v==='*') ? {t:'center'} : {t:'alabel', area:v};
  }

  var html='';
  for(var r2=0;r2<9;r2++) for(var c2=0;c2<9;c2++){
    var cell=cells[r2][c2];
    if(!cell){ html+='<div class="cell"></div>'; continue; }

    if(cell.t==='q'){
      var q=QUESTS[cell.qid]||{};
      var ac=(CHARS[cell.qid.charAt(0)]||{}).color||'#888';
      var ratio=fillRatio(cell.qid);
      var full=ratio>=1;
      html+='<a class="cell qcell'+(full?' full':'')+'" href="quests/'+cell.qid+'.html" '
          +'style="background:'+tileBg(ratio)+';border-color:'+ac+'66" title="'+esc(q.name||'')+'（累積'+(CUM[cell.qid]||0)+'% / '+TH+'%）">'
          +'<span class="qid" style="color:'+ac+'">'+cell.qid+'</span>'
          +'<span class="nm">'+esc(q.name||'準備中')+'</span>'
          +'<span class="step">'+cell.n+'</span>'
          +'<span class="pctb"><i style="width:'+Math.round(ratio*100)+'%;background:'+ac+'"></i></span>'
          +'</a>';
    }
    else if(cell.t==='gate'){
      var ch=CHARS[cell.area]||{}, ar=AREAS[cell.area]||{};
      var gc=ch.color||'#607d8b';
      html+='<div class="cell gate" style="background:linear-gradient(155deg,'+gc+'cc,rgba(10,6,18,.9));border-color:'+gc+'" title="エリア'+cell.area+' ガイド：'+esc(ch.name||'')+'">'
          +'<span class="astamp">'+cell.area+'</span>'
          +(ch.img?'<img src="'+esc(ch.img)+'" alt="'+esc(ch.name||'')+'" style="border-color:'+gc+'">':'<div style="font-size:1.6rem">'+(ch.emoji||'👾')+'</div>')
          +'<span class="stp">STEP '+(ar.step||'?')+'</span>'
          +'<span class="ttl">'+esc(ar.title||cell.area)+'</span>'
          +'</div>';
    }
    else if(cell.t==='alabel'){
      var ar2=AREAS[cell.area]||{};
      html+='<a class="cell alabel" href="#" onclick="scrollToArea(\''+cell.area+'\');return false" title="'+esc(ar2.title||'')+'">'
          +'<span class="stp">STEP '+(ar2.step||'?')+'</span>'
          +'<span class="a">'+cell.area+'</span>'
          +'<span class="t">'+esc(ar2.title||'')+'</span>'
          +'</a>';
    }
    else { /* center */
      html+='<div class="cell center">'
          +'<span class="c1">'+esc(CENTER.catch)+'</span>'
          +'<span class="c2">'+esc(CENTER.sub)+'</span>'
          +'</div>';
    }
  }
  grid.innerHTML=html;

  /* 中央のエリアラベル→該当エリアの中心セルへ軽くスクロール＆光らせる */
  window.scrollToArea=function(a){
    var ap=AREA_POS[a]; if(!ap) return;
    var idx=(ap[0]*3+1)*9 + (ap[1]*3+1);
    var el=grid.children[idx]; if(!el) return;
    el.scrollIntoView({behavior:'smooth', block:'center'});
    el.style.boxShadow='0 0 22px #FFD700'; setTimeout(function(){el.style.boxShadow='';},1200);
  };
})();
</script>
</body>
</html>
